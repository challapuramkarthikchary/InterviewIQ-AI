spring.application.name=interview-starter

# ===== MySQL connection =====
spring.datasource.url=jdbc:mysql://localhost:3306/interviewiq?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Server =====
server.port=8038


# ----- AI Evaluation (Gemini) -----
# Get a free key: https://aistudio.google.com/app/apikey
# Leave empty to fall back to manual rule-based scoring.
ai.gemini.api-key=YOUR_GEMINI_API_KEY