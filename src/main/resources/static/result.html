<!DOCTYPE html>
<!--
  ============================================================
   result.html
   ----------------------------------------------------------
   This page is shown AFTER submitting.html finishes evaluating
   the user's interview. It displays:

     1. A big animated SVG ring with the overall score (0–100)
     2. A breakdown of sub-scores (Relevance, Confidence,
        Communication, Filler Words) shown as horizontal bars
     3. Two lists: Strengths (green) + Weaknesses (red)
     4. A list of Recommendations (purple)

   Where does the data come from?
     submitting.html saved a JSON object in localStorage under
     the key "result". This page reads it back and renders it.

   If the user opens this page directly (no result in storage),
   we show a friendly "No result found" empty state instead.
  ============================================================
-->
<html lang="en">
<head>
    <!-- UTF-8 = supports emojis (🎯 ✓ ⚠) and any language characters. -->
    <meta charset="UTF-8" />

    <!-- Browser tab title. -->
    <title>Your Result | InterviewIQ AI</title>

    <!-- Pull the Poppins font from Google so the page looks polished. -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ============================================================
         All page-specific CSS lives in this <style> block so the
         file is self-contained. In a bigger project these rules
         would move into style.css.
         ============================================================ -->
    <style>
        /* ----- Global reset -----
           The "*" selector matches EVERY element. We zero out the
           browser's default margins/padding and switch to border-box
           sizing (so width = the box you see, not box + padding). */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        /* Lock the page to the viewport height. overflow:hidden means
           the whole page never scrolls — only individual cards can. */
        html, body { height: 100vh; overflow: hidden; background: #f8f9fc; color: #1F2937; }

        /* ----- Fade-in animation for cards entering the page -----
           "from" = starting state,  "to" = ending state.
           We start slightly below + invisible, then float up + fade in. */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* ----- Shell: 4-row CSS grid that fits exactly 100vh -----
           grid-template-rows: auto auto auto 1fr
             row 1 (header)      = auto (just as tall as needed)
             row 2 (score hero)  = auto
             row 3 (breakdown)   = auto
             row 4 (bottom row)  = 1fr (takes ALL remaining space) */
        .result-shell {
          height: 100vh;
          max-width: 1200px;     /* don't stretch on huge monitors */
          margin: 0 auto;        /* centre horizontally */
          padding: 14px 24px 16px;
          display: grid;
          grid-template-rows: auto auto auto 1fr;
          gap: 12px;             /* space between rows */
        }

        /* Apply the fadeUp animation to every direct child of the shell.
           min-height: 0 is a CSS-grid trick — without it, scrollable
           children inside a 1fr row don't shrink properly. */
        .result-shell > * { animation: fadeUp 0.4s ease both; min-height: 0; }

        /* Stagger the animation: 2nd child starts 0.04s late, 3rd at
           0.08s, 4th at 0.12s. Creates a nice "wave" entry effect. */
        .result-shell > *:nth-child(2) { animation-delay: 0.04s; }
        .result-shell > *:nth-child(3) { animation-delay: 0.08s; }
        .result-shell > *:nth-child(4) { animation-delay: 0.12s; }

        /* ===== Header bar ===== */
        .result-head {
          display: flex; justify-content: space-between; align-items: center;
          flex-wrap: wrap;     /* allow wrapping on tiny screens */
          gap: 10px;
        }
        .result-head h1 { font-size: 20px; font-weight: 700; color: #111827; letter-spacing: -0.4px; }
        .result-head p  { font-size: 12.5px; color: #6B7280; margin-top: 2px; }
        .head-actions   { display: flex; gap: 8px; }

        /* ===== Buttons ===== */
        .btn {
          padding: 8px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 500;
          font-family: 'Poppins', sans-serif; cursor: pointer; border: none;
          /* Smoothly animate ALL these properties when they change (e.g. on hover). */
          transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
          text-decoration: none;       /* remove underline from <a> buttons */
          display: inline-flex; align-items: center; gap: 6px;
        }
        /* "Outline" style = white background + grey border. */
        .btn-outline { background: white; border: 1px solid #E5E7EB; color: #374151; }
        .btn-outline:hover { background: #F3F4F6; border-color: #D1D5DB; }
        /* "Primary" style = purple gradient + soft shadow. */
        .btn-primary {
          background: linear-gradient(135deg, #6C63FF, #8A7CFF); color: white;
          box-shadow: 0 4px 12px rgba(108,99,255,0.28);
        }
        /* On hover, lift + slightly grow + bigger shadow → tactile feel. */
        .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 20px rgba(108,99,255,0.38); }

        /* ===== Generic white card (used in many places) ===== */
        .card {
          background: white; border-radius: 12px; padding: 14px 18px;
          box-shadow: 0 6px 18px rgba(0,0,0,0.05);   /* soft drop shadow */
          border: 1px solid #F1F2F6;
          display: flex; flex-direction: column;     /* stack children vertically */
          min-height: 0;                              /* allow inner scroll areas to shrink */
          transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,0.07); }
        .card h3 {
          font-size: 13px; font-weight: 600; color: #1F2937;
          margin-bottom: 10px; flex-shrink: 0;       /* don't let the title shrink */
          display: flex; align-items: center; gap: 8px;
        }

        /* ============================================
           TOP: Score hero card (the big ring + label)
           ============================================ */
        .score-hero {
          display: flex; align-items: center; gap: 24px;   /* ring on left, text on right */
          padding: 14px 22px;
        }

        /* Wrapper around the SVG — relative so the centred number can be absolute. */
        .ring-wrap {
          position: relative; flex-shrink: 0;
          width: 100px; height: 100px;
        }
        /* Rotate the SVG -90° so the ring starts drawing at 12 o'clock,
           not at 3 o'clock (SVG's default starting angle). */
        .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }

        /* Background ring (always full, grey). */
        .ring-track {
          fill: none; stroke: #EEF0F4; stroke-width: 10;
        }

        /* Foreground coloured ring — this is the one that animates.
           The "magic two lines" for ring animation:
             stroke-dasharray  = total dash length  (= circumference of r=45 circle)
             stroke-dashoffset = how much of that dash is hidden
           offset 283 → ring is empty.    offset 0 → ring is full.
           For 70% the JS will set offset = 283 - 0.7×283 ≈ 85. */
        .ring-fill {
          fill: none;
          stroke: var(--ring-color, #4caf50);   /* JS sets --ring-color via inline style */
          stroke-width: 10;
          stroke-linecap: round;                /* rounded tips look nicer */
          stroke-dasharray: 283;                /* 2 × π × 45 ≈ 283 */
          stroke-dashoffset: 283;               /* start fully hidden (empty ring) */
          transition: stroke-dashoffset 1.2s cubic-bezier(.2,.8,.2,1),
                      stroke 0.4s ease;
        }

        /* The score number sits ON TOP of the SVG, centred.
           inset:0 + flex centring is the cleanest way to overlay text. */
        .ring-text {
          position: absolute; inset: 0;
          display: flex; align-items: center; justify-content: center;
          flex-direction: column; gap: 0;
        }
        .ring-text .num {
          font-size: 26px; font-weight: 700; line-height: 1;
          color: var(--ring-color, #4caf50);    /* matches the ring colour */
          letter-spacing: -1px;
        }
        .ring-text .denom {
          font-size: 10px; font-weight: 500; color: #9CA3AF; margin-top: 2px;
        }

        /* Right side of the hero: small uppercase eyebrow + big label + description. */
        .score-info { flex: 1; min-width: 0; }
        .score-info .eyebrow {
          font-size: 11px; font-weight: 600; color: #6B7280;
          text-transform: uppercase; letter-spacing: 0.8px;
          margin-bottom: 6px;
          display: inline-flex; align-items: center; gap: 6px;
        }
        .score-info .label {
          font-size: 22px; font-weight: 700; color: #111827;
          letter-spacing: -0.4px; margin-bottom: 4px; line-height: 1.15;
        }
        .score-info .desc { font-size: 12.5px; color: #6B7280; line-height: 1.5; }

        /* ============================================
           MIDDLE: Score breakdown (4 horizontal bars)
           ============================================ */
        .breakdown {
          display: flex; flex-direction: column; gap: 10px;
        }
        /* Each row = label | bar | value, in 3 fixed columns.
           160px label + flexible bar + 80px value column. */
        .bar-row {
          display: grid;
          grid-template-columns: 160px 1fr 80px;
          align-items: center;
          gap: 14px;
        }
        .bar-row .bar-label {
          font-size: 12.5px; font-weight: 500; color: #374151;
          display: flex; align-items: center; gap: 6px;
        }
        /* Grey "rail" the fill slides along. inset shadow gives a slight depth. */
        .bar-track {
          background: #EEF0F4; height: 7px; border-radius: 999px; overflow: hidden;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
        }
        /* The coloured fill INSIDE the track — starts at width 0; JS animates it. */
        .bar-fill {
          height: 100%; width: 0; border-radius: 999px;
          transition: width 1.1s cubic-bezier(.2,.8,.2,1);
        }
        /* Three colour tones based on score (chosen by JS). */
        .bar-fill.good { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .bar-fill.mid  { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .bar-fill.low  { background: linear-gradient(90deg, #ff6b6b, #ff8787); }

        .bar-value { text-align: right; }

        /* ----- Pill badges (used for textual values like "high"/"medium"/"low") ----- */
        .pill {
          display: inline-block;
          padding: 3px 10px; border-radius: 999px;   /* fully rounded "pill" shape */
          font-size: 11px; font-weight: 600;
          text-transform: capitalize;                /* "low" → "Low" automatically */
          letter-spacing: 0.2px;
        }
        .pill.good { background: #ECFDF5; color: #15803d; border: 1px solid #BBF7D0; }
        .pill.mid  { background: #FFFBEB; color: #B45309; border: 1px solid #FDE68A; }
        .pill.low  { background: #FEF2F2; color: #B91C1C; border: 1px solid #FCA5A5; }

        /* Numeric values like "78%" or "3 used". */
        .num-val { font-size: 12.5px; font-weight: 600; color: #111827; }

        /* ============================================
           BOTTOM: 3 equal-height columns
           (Strengths | Weaknesses | Recommendations)
           ============================================ */
        .bottom-row {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;   /* three equal columns */
          gap: 12px;
          min-height: 0;
          align-items: stretch;                  /* all 3 cards same height */
        }
        .bottom-row .card { height: 100%; }     /* fill the row vertically */

        /* ----- Strengths / Weaknesses lists ----- */
        .feedback-list {
          list-style: none; padding: 0; margin: 0;
          display: flex; flex-direction: column; gap: 8px;
          overflow-y: auto;                      /* scroll if many items */
          flex: 1;                               /* take all remaining card height */
        }
        .feedback-list li {
          display: flex; align-items: flex-start; gap: 10px;
          font-size: 12.5px; color: #374151; line-height: 1.5;
        }
        /* Small circular "dot" with ✓ or ! inside, next to each item. */
        .feedback-list .dot {
          flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
          display: inline-flex; align-items: center; justify-content: center;
          font-size: 11px; font-weight: 700; margin-top: 1px;
        }
        .strengths .dot   { background: #ECFDF5; color: #22c55e; }   /* green */
        .weaknesses .dot  { background: #FEF2F2; color: #ff6b6b; }   /* red   */

        /* Coloured icons next to the card titles. */
        .icon-check { color: #22c55e; font-size: 15px; }
        .icon-warn  { color: #ff6b6b; font-size: 15px; }
        .icon-bulb  { color: #6C63FF; font-size: 15px; }

        /* ----- Recommendations list (slightly different style) ----- */
        .check-list {
          list-style: none; padding: 0; margin: 0;
          display: flex; flex-direction: column; gap: 8px;
          overflow-y: auto; flex: 1;
        }
        .check-list li {
          display: flex; align-items: flex-start; gap: 10px;
          padding: 8px 12px; background: #F9FAFB; border: 1px solid #F1F2F6;
          border-radius: 8px; font-size: 12.5px; color: #374151; line-height: 1.5;
          transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }
        /* On hover, slide a tiny bit to the right + light purple tint → feels alive. */
        .check-list li:hover { background: #F3F4FF; border-color: #E0E7FF; transform: translateX(2px); }
        .check-list .check-box {
          flex-shrink: 0; width: 18px; height: 18px; border-radius: 5px;
          background: #EEF2FF; color: #6C63FF; display: inline-flex;
          align-items: center; justify-content: center; font-size: 11px;
          font-weight: 700; margin-top: 1px;
        }

        /* Slim custom scrollbars (Webkit browsers only). */
        .feedback-list::-webkit-scrollbar,
        .check-list::-webkit-scrollbar    { width: 4px; }
        .feedback-list::-webkit-scrollbar-thumb,
        .check-list::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 999px; }

        /* ----- Empty state (shown when localStorage has no result) ----- */
        .empty { text-align: center; padding: 60px 20px; }
        .empty h2 { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 8px; }
        .empty p  { color: #6B7280; margin-bottom: 18px; }

        /* ----- Responsive: stack into one column on small screens ----- */
        @media (max-height: 640px), (max-width: 760px) {
          html, body    { height: auto; overflow: auto; }   /* allow page scroll */
          .result-shell { height: auto; grid-template-rows: none; }
          .bottom-row   { grid-template-columns: 1fr; }     /* stack 3 cards vertically */
          .score-hero   { flex-direction: column; text-align: center; gap: 14px; }
          .bar-row      { grid-template-columns: 1fr; gap: 4px; }
          .bar-value    { text-align: left; }
        }
    </style>
</head>
<body>

<!--
  Outer 4-row grid:
    row 1 = header
    row 2 = score hero (ring + label)
    row 3 = breakdown bars
    row 4 = bottom row (strengths / weaknesses / recommendations)
-->
<div class="result-shell" id="shell">

    <!-- ===== Row 1: Page header + action buttons ===== -->
    <header class="result-head">
        <div>
            <h1>🎯 Interview Result</h1>
            <!-- The role text inside this <span> is filled in by JS. -->
            <p>Here's how you performed in your <span id="roleLabel">interview</span></p>
        </div>
        <div class="head-actions">
            <!-- These are <a> tags styled as buttons (no JS needed for nav). -->
            <a href="dashboard.html"  class="btn btn-outline">← Back to Dashboard</a>
            <a href="setup-role.html" class="btn btn-primary">Try Again →</a>
        </div>
    </header>

    <!-- ===== Row 2: Overall Score (ring + label, side by side) ===== -->
    <section class="card score-hero">

        <!-- The score ring (SVG) — wrap is "relative" so the number can sit on top. -->
        <div class="ring-wrap" id="ringWrap">
            <!-- viewBox="0 0 100 100" = a 100×100 unit coordinate system.
                 cx=50, cy=50 = the centre.  r=45 = the radius. -->
            <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
                <!-- Grey background ring (always full). -->
                <circle class="ring-track" cx="50" cy="50" r="45"></circle>
                <!-- Coloured foreground ring (animates). id so JS can grab it. -->
                <circle class="ring-fill"  cx="50" cy="50" r="45" id="ringFill"></circle>
            </svg>

            <!-- The score number sits ON TOP of the SVG (centered via CSS). -->
            <div class="ring-text">
                <span class="num"   id="scoreValue">--</span>   <!-- e.g. "72" -->
                <span class="denom">/ 100</span>                <!-- always "/ 100" -->
            </div>
        </div>

        <!-- Right side: eyebrow text, big label, and a short description. -->
        <div class="score-info">
            <div class="eyebrow">🎯 Overall Score</div>
            <div class="label" id="scoreLabel">Loading...</div>
            <div class="desc">
                You answered <b id="answeredCount">0</b> questions in your mock interview.
            </div>
        </div>
    </section>

    <!-- ===== Row 3: Score breakdown (4 horizontal bars) ===== -->
    <section class="card">
        <h3>📊 Score Breakdown</h3>
        <!-- Empty container — JS will fill it with .bar-row divs. -->
        <div class="breakdown" id="breakdown"></div>
    </section>

    <!-- ===== Row 4: Bottom row of 3 equal-height columns ===== -->
    <div class="bottom-row">
        <!-- Strengths card (green) -->
        <section class="card strengths">
            <h3><span class="icon-check">✓</span> Strengths</h3>
            <ul class="feedback-list" id="strengthsList"></ul>
        </section>

        <!-- Weaknesses card (red) -->
        <section class="card weaknesses">
            <h3><span class="icon-warn">⚠</span> Weaknesses</h3>
            <ul class="feedback-list" id="weaknessesList"></ul>
        </section>

        <!-- Recommendations card (purple) -->
        <section class="card">
            <h3><span class="icon-bulb">💡</span> Recommendations</h3>
            <ul class="check-list" id="suggestionsList"></ul>
        </section>
    </div>

</div>

<script>
    /* ============================================================
     *  result.html — JavaScript
     *  ----------------------------------------------------------
     *  The whole flow in 3 sentences:
     *    1) Read the result that submitting.html saved in localStorage.
     *    2) If nothing is there, show a friendly "No result found" card.
     *    3) Otherwise, run render(r) to paint the score ring, the
     *       breakdown bars, and the 3 feedback lists.
     * ============================================================ */


    // ──────────────────────────────────────────────────────────────
    // STEP 1 — Read the saved result
    // ──────────────────────────────────────────────────────────────
    // localStorage.getItem returns either the saved string OR null.
    // "|| 'null'"  → if the key is missing, JSON.parse('null') gives us
    // null (a clean signal we can check with `if (!r)` below).
    const r = JSON.parse(localStorage.getItem("result") || "null");

    // The user's chosen role ("Frontend", "Java Developer", etc.) was
    // saved during the setup wizard. Default to "interview" if missing.
    // We immediately update the small text in the header:
    //   "Here's how you performed in your <role> interview"
    document.getElementById("roleLabel").textContent =
      (localStorage.getItem("role") || "interview") + " interview";


    // ──────────────────────────────────────────────────────────────
    // Tiny reusable helpers (defined once, used many times below)
    // NOTE: declared BEFORE we call render(), otherwise we hit a
    //       "Cannot access 'tone' before initialization" TDZ error.
    // ──────────────────────────────────────────────────────────────

    /* esc()  — make user/AI text safe to inject with innerHTML.
       WHY? If the AI returns text containing characters like "<" or ">"
       and we put it into the page with innerHTML, the browser would
       interpret it as HTML — and a malicious <script> could actually RUN.
       This is called an XSS attack. Replacing the 5 special characters
       with their HTML entities turns them into plain text. */
    const esc  = s => String(s).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

    /* tone()  — pick a CSS class name based on a numeric score 0–100.
       Used by both the bar fills AND the relevance pill.
         value >= 70  →  "good"  (green)
         value >= 40  →  "mid"   (yellow)
         value < 40   →  "low"   (red)
       NOTE: order matters in chained ternaries — highest first. */
    const tone = v => v >= 70 ? "good" : v >= 40 ? "mid" : "low";


    // ──────────────────────────────────────────────────────────────
    // STEP 2 — Branch: empty state OR render
    // ──────────────────────────────────────────────────────────────
    if (!r) {
      // No result in localStorage → user probably opened this page
      // directly without doing an interview. Replace the WHOLE shell
      // with a single "empty" card. Backticks (`...`) let us write
      // multi-line HTML without messy + concatenation.
      document.getElementById("shell").innerHTML = `
        <div class="card empty">
          <h2>No result found</h2>
          <p>Please complete an interview first.</p>
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>`;
    } else render(r);   // We have data — paint the page.


    // ──────────────────────────────────────────────────────────────
    // STEP 3 — The big render function
    //          `r` = the result object loaded from localStorage.
    // ──────────────────────────────────────────────────────────────
    function render(r) {

      // ----- (a) Compute the overall score, colour, and label ------
      //
      // r.score may be a decimal, missing, or even out of range.
      // Math.max + Math.min keeps it inside 0..100 (this is "clamping").
      // "?? 0" means "use 0 if r.score is null/undefined".
      const score = Math.max(0, Math.min(100, r.score ?? 0));

      // Pick the ring colour based on the score (3 buckets).
      // Read top → bottom like if / else if / else.
      const color = score > 70  ? "#22c55e"    // green  (great)
                  : score >= 40 ? "#facc15"    // yellow (okay)
                  :               "#ff6b6b";   // red    (low)

      // Pick a friendly label based on the score (5 buckets).
      const label = score >= 85 ? "Excellent performance!"
                  : score >= 70 ? "Great effort!"
                  : score >= 55 ? "Decent — keep practicing."
                  : score >= 40 ? "Needs improvement."
                  :               "Needs more practice.";


      // ----- (b) Fill in the page elements -------------------------
      //
      // Browser trick: any element with an `id` is automatically
      // exposed as a global variable with that same name. So instead
      // of `document.getElementById("scoreValue").textContent = ...`
      // we can just write `scoreValue.textContent = ...`. Shorter,
      // but a bit magical — that's why we leave this comment.
      scoreValue.textContent    = score;                  // the big number
      scoreLabel.textContent    = label;                  // the friendly label
      answeredCount.textContent = r.answeredCount || 0;   // "You answered N questions"

      // Set a CSS variable on .ring-wrap. Both the ring stroke AND
      // the score-number colour read this variable (`var(--ring-color)`),
      // so one line updates both at the same time.
      ringWrap.style.setProperty("--ring-color", color);


      // ----- (c) Animate the SVG ring ------------------------------
      //
      // Math:  circumference = 2 × π × r = 2 × π × 45 ≈ 283
      //        For score 70:  dashoffset = 283 − 0.70 × 283 ≈ 85
      //        For score 100: dashoffset = 0  (ring fully visible)
      //
      // We pre-multiply once: 283 / 100 = 2.83. So `score * 2.83`
      // gives us the visible portion → 283 − that = how much to hide.
      //
      // WHY rAF + setTimeout?
      //   CSS already sets the starting offset to 283 (empty ring).
      //   If we change it immediately to the target value, the
      //   browser may "merge" the two states into one frame → no
      //   animation at all, just a jump. requestAnimationFrame waits
      //   for the next paint, and setTimeout(80) waits one extra
      //   tick to be SURE the empty state is shown first. Then the
      //   CSS transition (1.2s) smoothly fills the ring.
      ringFill.style.stroke           = color;
      ringFill.style.strokeDashoffset = 283;   // reset (empty)
      requestAnimationFrame(() => setTimeout(() =>
        ringFill.style.strokeDashoffset = 283 - score * 2.83, 80));


      // ----- (d) Compute the 4 breakdown bars ----------------------
      //
      // Short aliases so the math below is easier to read:
      //   f = filler-word count   (e.g. how many "um" / "like")
      //   c = confidence (0–100)  (how sure the AI thinks you sounded)
      const f = r.fillerWords ?? 0,
            c = r.confidence  ?? 0;

      // Communication = Confidence reduced by HALF the filler penalty.
      // The filler penalty grows by 8 per filler but caps at 40 — so
      // even a very chatty answer can't completely destroy the score.
      // Examples:
      //   3 fillers → penalty 24  → comm = c − 12
      //  10 fillers → penalty 40  → comm = c − 20  (capped)
      // The outer Math.max/Math.min clamps the result to 0..100.
      const comm = Math.max(0, Math.min(100, c - Math.min(40, f * 8) / 2));

      // Convert the AI's word relevance ("high"/"medium"/"low") into a
      // percentage so we can draw a bar for it. Anything not "high" or
      // "medium" (including missing data) is treated as low → 25.
      const rel = r.relevance === "high"   ? 90
                : r.relevance === "medium" ? 60
                :                            25;

      // Tiny inline helper: builds the right-hand cell of a bar row
      // (e.g. "78%" or "3 used"). Defined inside render() so it can
      // stay close to the bars array.
      const num = (n, suf) => `<span class="num-val">${n}${suf}</span>`;

      // The array of bars to render. Each entry is a tuple:
      //   [ label shown on the left,
      //     numeric value used for the bar width and tone,
      //     HTML shown on the right ]
      // Using tuples (arrays) instead of objects keeps the code compact.
      breakdown.innerHTML = [
        ["🎯 Relevance",     rel,                       `<span class="pill ${tone(rel)}">${esc(r.relevance || "low")}</span>`],
        ["💪 Confidence",    c,                         num(c, "%")],
        ["🗣 Communication", Math.round(comm),          num(Math.round(comm), "%")],
        ["⏸ Filler Words",   Math.max(0, 100 - f*12),   num(f, " used")]
      ]
      // .map(...) converts each tuple into an HTML string.
      // The "[lbl, v, right]" syntax is "destructuring" — it pulls
      // the three array elements out into named variables in one step.
      .map(([lbl, v, right]) => `
        <div class="bar-row">
          <div class="bar-label">${lbl}</div>
          <div class="bar-track">
            <!-- data-w stashes the target width so we can read it
                 back later inside the staggered animation block. -->
            <div class="bar-fill ${tone(v)}" data-w="${v}"></div>
          </div>
          <div class="bar-value">${right}</div>
        </div>`)
      // .join("") glues all the strings into one big HTML blob,
      // which we hand to innerHTML — much faster than 4 separate writes.
      .join("");


      // ----- (e) Animate the bars filling in, one after another ----
      //
      // Each .bar-fill starts at width 0 (CSS). After a small delay
      // we set its real width → the CSS transition (1.1s) animates it.
      //
      // Stagger formula:  150 + i * 110
      //   bar 0 → 150ms     bar 1 → 260ms
      //   bar 2 → 370ms     bar 3 → 480ms
      // This "wave" of bars feels much more alive than all filling at once.
      requestAnimationFrame(() =>
        document.querySelectorAll(".bar-fill").forEach((el, i) =>
          setTimeout(() => el.style.width = el.dataset.w + "%", 150 + i * 110))
      );


      // ----- (f) Strengths / Weaknesses / Recommendations ----------
      //
      // Tiny helper that fills any <ul> with one <li> per array item.
      // If the array is empty/missing, we substitute ["—"] so the card
      // is never blank (better UX than an empty box).
      // We esc() every text item to stay safe from XSS (see top of file).
      const list = (id, items, icon, cls) =>
        document.getElementById(id).innerHTML =
          (items?.length ? items : ["—"]).map(t =>
            `<li><span class="${cls}">${icon}</span><span>${esc(t)}</span></li>`
          ).join("");

      // Three lists, three different icons + CSS classes:
      list("strengthsList",  r.strengths,  "✓", "dot");        // green dots
      list("weaknessesList", r.weaknesses, "!", "dot");        // red dots
      list("suggestionsList",
        // If the AI gave us no suggestions, fall back to a default one
        // so the Recommendations card is never empty.
        r.suggestions?.length
          ? r.suggestions
          : ["Keep practicing weekly to maintain this level."],
        "✓", "check-box");                                     // purple checkboxes
    }
</script>

</body>
