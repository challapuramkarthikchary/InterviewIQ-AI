<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Sign Up - InterviewIQ AI</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page signup-page">

<div class="split-container">

    <!-- LEFT: Brand + Illustration -->
    <div class="split-left">
        <div class="brand-block">
            <div class="brand-logo">InterviewIQ AI</div>
            <div class="brand-tagline">AI Mock Interview Platform</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" alt="Signup Illustration" />
    </div>

    <!-- RIGHT: Signup Form -->
    <div class="split-right">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            <p class="muted">Start practicing interviews with AI today</p>

            <form id="signupForm">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required />

                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" required />

                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required />

                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="••••••••" required />

                <button type="submit" class="btn btn-primary btn-full">Sign Up</button>

                <p class="bottom-text">
                    Already have an account? <a href="login.html">Login</a>
                </p>
            </form>
        </div>
    </div>

</div>

<script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      // Simple check: passwords must match
      if (password !== confirm) {
        alert("Passwords do not match");
        return;
      }

      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        if (res.ok) {
          alert("Account created! Please login.");
          window.location.href = "login.html";
        } else {
          alert("Signup failed. Try again.");
        }
      } catch (err) {
        alert("Server error: " + err.message);
      }
    });
</script>

</body>
</html>
