<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Step 3 - Difficulty | InterviewIQ AI</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="setup-panel-page">

<div class="main-container">

    <!-- ===== TOP: Header + Stepper + Section title ===== -->
    <div class="top-section">

        <div class="panel-header">
            <h1>Let's set up your interview</h1>
            <p>Tell us about your preferences</p>
        </div>

        <div class="step-bar">
            <div class="step done">
                <div class="step-circle">✓</div>
                <div class="step-label">Role</div>
            </div>
            <div class="step-line"></div>
            <div class="step done">
                <div class="step-circle">✓</div>
                <div class="step-label">Experience</div>
            </div>
            <div class="step-line"></div>
            <div class="step active">
                <div class="step-circle">3</div>
                <div class="step-label">Difficulty</div>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-circle">4</div>
                <div class="step-label">Duration</div>
            </div>
        </div>

        <div class="section-heading">
            <h2>Select Difficulty Level</h2>
            <p>Choose the complexity of questions</p>
        </div>

    </div>

    <!-- ===== MIDDLE: Difficulty cards (centered) ===== -->
    <div class="difficulty-row">
        <div class="difficulty-card easy" data-value="Easy">
            <div class="diff-icon">💡</div>
            <div class="diff-title">Easy</div>
            <div class="diff-subtitle">Basic level questions</div>
        </div>
        <div class="difficulty-card medium" data-value="Medium">
            <div class="diff-icon">👑</div>
            <div class="diff-title">Medium</div>
            <div class="diff-subtitle">Moderate level questions</div>
        </div>
        <div class="difficulty-card hard" data-value="Hard">
            <div class="diff-icon">⚠️</div>
            <div class="diff-title">Hard</div>
            <div class="diff-subtitle">Advanced level questions</div>
        </div>
    </div>

    <!-- ===== BOTTOM: Action buttons ===== -->
    <div class="footer-actions">
        <button class="btn-back" onclick="window.location.href='experience.html'">← Back</button>
        <button class="btn-next" onclick="goNext()">Next →</button>
    </div>

</div>

<script>
    const STORAGE_KEY = "difficulty";
    const NEXT_PAGE   = "duration.html";

    let selected = localStorage.getItem(STORAGE_KEY) || null;

    document.querySelectorAll(".difficulty-card").forEach(card => {
      if (card.dataset.value === selected) card.classList.add("selected");

      card.addEventListener("click", () => {
        document.querySelectorAll(".difficulty-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        selected = card.dataset.value;
        localStorage.setItem(STORAGE_KEY, selected);
      });
    });

    function goNext() {
      if (!selected) {
        alert("Please select a difficulty level.");
        return;
      }
      window.location.href = NEXT_PAGE;
    }
</script>

</body>
</html>
